<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Second Brain</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:280px;min-width:220px;background:#1e293b;display:flex;flex-direction:column;border-right:1px solid #334155}
.sidebar-header{padding:16px;border-bottom:1px solid #334155}
.sidebar-header h2{margin:0 0 12px;font-size:18px}
#searchBox{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff;margin-bottom:8px}
#newNoteBtn{width:100%;padding:8px;border:none;border-radius:6px;background:#22c55e;color:#052e16;font-weight:bold;cursor:pointer}
#newNoteBtn:hover{opacity:.9}
.notes-list{flex:1;overflow-y:auto}
.note-item{padding:12px 16px;border-bottom:1px solid #334155;cursor:pointer}
.note-item:hover{background:#334155}
.note-item.active{background:#334155;border-left:3px solid #22c55e}
.note-item .nt{font-weight:bold;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item .ns{font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.note-item .nd{font-size:11px;color:#64748b;margin-top:4px}
.editor{flex:1;display:flex;flex-direction:column;padding:24px;overflow-y:auto}
.empty-state{margin:auto;color:#64748b;font-size:16px;text-align:center}
.title-input{font-size:24px;font-weight:bold;background:transparent;border:none;color:#fff;padding:6px 0;border-bottom:1px solid #334155;margin-bottom:10px}
.title-input:focus{outline:none;border-bottom:1px solid #22c55e}
.tags-input{font-size:13px;background:transparent;border:none;color:#94a3b8;padding:4px 0;border-bottom:1px solid #334155;margin-bottom:16px}
.tags-input:focus{outline:none;border-bottom:1px solid #22c55e}
.content-input{flex:1;min-height:280px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;padding:14px;font-size:15px;line-height:1.5;resize:vertical}
.content-input:focus{outline:none;border-color:#22c55e}
.attachments-section{margin-top:20px}
.attachments-section h4{margin:0 0 8px;color:#94a3b8;font-size:13px;text-transform:uppercase;letter-spacing:.5px}
.attachment-row{display:flex;align-items:center;justify-content:space-between;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:13px}
.attachment-row a{color:#38bdf8;text-decoration:none}
.attachment-row a:hover{text-decoration:underline}
.attachment-row button{padding:4px 8px;font-size:12px;margin:0}
#attachBtn{background:#334155;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;margin-top:4px}
.editor-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.save-status{font-size:12px;color:#64748b}
button.danger{background:#7f1d1d;color:#fecaca}
button.danger:hover{background:#991b1b}
button{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;background:#334155;color:#fff}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
#lockScreen{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100}
#lockScreen h2{margin-bottom:4px}
#lockScreen p{color:#64748b;font-size:13px;margin-top:0;margin-bottom:20px}
#pinInput{font-size:24px;letter-spacing:8px;text-align:center;width:180px;padding:10px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff}
#pinInput:focus{outline:none;border-color:#22c55e}
#pinError{color:#f87171;font-size:13px;margin-top:10px;min-height:16px}
#pinSubmit{margin-top:16px;background:#22c55e;color:#052e16;font-weight:bold;padding:8px 20px}
#rememberRow{margin-top:14px;font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px}
</style></head>
<body>
<div id="lockScreen">
  <h2>🔒 Second Brain</h2>
  <p>Enter your family PIN to continue</p>
  <input id="pinInput" type="password" inputmode="numeric" maxlength="12" autofocus>
  <div id="pinError"></div>
  <button id="pinSubmit">Unlock</button>
  <div id="rememberRow"><input type="checkbox" id="rememberMe" checked><label for="rememberMe">Remember me on this device</label></div>
</div>
<div class="app" id="appRoot" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>🧠 Second Brain</h2>
      <div id="accountLabel" style="font-size:12px;color:#94a3b8;margin-bottom:10px"></div>
      <input id="searchBox" placeholder="Search notes...">
      <button id="newNoteBtn">+ New Note</button>
      <button id="switchAccountBtn" style="width:100%;margin-top:6px;background:#334155">Switch Account</button>
    </div>
    <div id="notesList" class="notes-list"></div>
  </aside>
  <main class="editor">
    <div id="emptyState" class="empty-state">Select a note on the left, or create a new one to get started.</div>
    <div id="editorView" style="display:none;flex-direction:column;flex:1">
      <input id="titleInput" class="title-input" placeholder="Untitled">
      <input id="tagsInput" class="tags-input" placeholder="tags, comma, separated">
      <textarea id="contentInput" class="content-input" placeholder="Start writing..."></textarea>
      <div class="attachments-section">
        <h4>Attachments</h4>
        <div id="attachmentsList"></div>
        <input type="file" id="fileInput" style="display:none">
        <button id="attachBtn">📎 Attach File</button>
      </div>
      <div class="editor-footer">
        <span id="saveStatus" class="save-status"></span>
        <button id="deleteBtn" class="danger">Delete Note</button>
      </div>
    </div>
  </main>
</div>
</div>

<script>
/* ---------- PIN gate (multi-account) ----------
   Each family member gets their own name + 8+ digit PIN below.
   These are PLACEHOLDER PINs (10000001, 10000002, ...) -- change them
   before you share this with your family.

   To generate a real config, open a browser console (any page) and paste:

     const people = [['Mom','yourPinHere'],['Dad','yourPinHere']]; // add as many as you want
     Promise.all(people.map(async ([name,pin])=>{
       const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
       const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
       return `  {id:'${name.toLowerCase().replace(/\s+/g,'_')}', name:'${name}', pinHash:'${hex}'}`;
     })).then(lines=>console.log('const ACCOUNTS = [\n'+lines.join(',\n')+'\n];'));

   Then paste the printed ACCOUNTS array in below, replacing the placeholder one.
   Each PIN must be at least 8 digits -- longer PINs are harder to guess since
   there's no login-attempt rate limiting on a static page. */
const ACCOUNTS = [
  {id:'member1', name:'Family Member 1', pinHash:'dfa73f9264a72c077893423f8b32c476cc359b753af2e8934decfd7d135ec2e1'},
  {id:'member2', name:'Family Member 2', pinHash:'910f04f0efb681c1639130fd1a3e0de1f0e27398d24a46d7f8b5232f2da7e042'},
  {id:'member3', name:'Family Member 3', pinHash:'50f16d5b9b76d75c11c9d08515457a6a57d91152094617dfaccc5889478572fc'},
  {id:'member4', name:'Family Member 4', pinHash:'a90eaf8401e9bebb4b1a55a477be89be4e339a7a42ed1a119935eb02921e4ff8'},
  {id:'member5', name:'Family Member 5', pinHash:'c7526bf5ddd9f7b6a7fb96b76fa440b01d0da9115b65509e04e0680ff4a086a2'},
  {id:'member6', name:'Family Member 6', pinHash:'cc7ac666cfa9c30aaa99e1728a8997dd22f56ce09307897f614d79dd00a02ae9'}
];
const REMEMBER_KEY = 'sb_account_ok';
let currentAccountId = null;
let currentAccountName = null;

async function sha256Hex(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function findAccountByHash(hash){
  return ACCOUNTS.find(a => a.pinHash === hash) || null;
}

function enterAccount(account, remember){
  console.log('[enterAccount] entering as:', account);
  currentAccountId = account.id;
  currentAccountName = account.name;
  if(remember){
    localStorage.setItem(REMEMBER_KEY, JSON.stringify({id:account.id, pinHash:account.pinHash}));
  }
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'flex';
  document.getElementById('accountLabel').textContent = currentAccountName;
  initApp();
}

async function tryUnlock(){
  const val = document.getElementById('pinInput').value;
  const hash = await sha256Hex(val);
  console.log('[tryUnlock] entered PIN hash:', hash);
  const account = findAccountByHash(hash);
  if(account){
    enterAccount(account, document.getElementById('rememberMe').checked);
  } else {
    console.warn('[tryUnlock] no account matched this PIN');
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function switchAccount(){
  localStorage.removeItem(REMEMBER_KEY);
  location.reload();
}

document.getElementById('pinSubmit').addEventListener('click', tryUnlock);
document.getElementById('pinInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(); });
document.getElementById('switchAccountBtn').addEventListener('click', switchAccount);

(function checkRemembered(){
  try{
    const saved = JSON.parse(localStorage.getItem(REMEMBER_KEY) || 'null');
    if(saved){
      const account = ACCOUNTS.find(a => a.id === saved.id && a.pinHash === saved.pinHash);
      if(account) enterAccount(account, false);
    }
  }catch(e){}
})();

const SUPABASE_URL = 'https://bxehlwnuxotyvtzjhjka.supabase.co';
const SUPABASE_KEY = 'sb_publishable_keen_9L13vujJMqX8n3RSw_HCWUXDl-';
console.log('[init] Supabase URL in use:', SUPABASE_URL);
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let notesCache = [];
let currentNoteId = null;
let saveTimer = null;
let searchTerm = '';

/* ---------- data loading ---------- */
async function loadNotes(){
  console.log('[loadNotes] fetching for account:', currentAccountId);
  let query = sb.from('notes').select('id,title,content,tags,updated_at').eq('account_id', currentAccountId).order('updated_at',{ascending:false});
  const {data, error} = await query;
  if(error){console.error('[loadNotes] ERROR:', error);return;}
  console.log('[loadNotes] got', data ? data.length : 0, 'notes:', data);
  notesCache = data || [];
  renderNotesList();
}

function matchesSearch(n){
  if(!searchTerm) return true;
  const t = searchTerm.toLowerCase();
  return (n.title||'').toLowerCase().includes(t) ||
         (n.content||'').toLowerCase().includes(t) ||
         (n.tags||[]).some(tag=>tag.toLowerCase().includes(t));
}

function renderNotesList(){
  const container = document.getElementById('notesList');
  const filtered = notesCache.filter(matchesSearch);
  if(filtered.length===0){
    container.innerHTML = '<div style="padding:16px;color:#64748b;font-size:13px">No notes found.</div>';
    return;
  }
  container.innerHTML = filtered.map(n=>{
    const snippet = (n.content||'').replace(/\s+/g,' ').slice(0,60);
    const d = new Date(n.updated_at);
    const dateStr = d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const active = n.id===currentNoteId ? 'active' : '';
    return `<div class="note-item ${active}" data-id="${n.id}">
      <div class="nt">${escapeHtml(n.title || 'Untitled')}</div>
      <div class="ns">${escapeHtml(snippet)}</div>
      <div class="nd">${dateStr}</div>
    </div>`;
  }).join('');
  container.querySelectorAll('.note-item').forEach(el=>{
    el.addEventListener('click',()=>selectNote(el.dataset.id));
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- selecting / editing ---------- */
async function selectNote(id){
  currentNoteId = id;
  renderNotesList();
  const note = notesCache.find(n=>n.id===id);
  if(!note) return;
  document.getElementById('emptyState').style.display='none';
  document.getElementById('editorView').style.display='flex';
  document.getElementById('titleInput').value = note.title || '';
  document.getElementById('tagsInput').value = (note.tags||[]).join(', ');
  document.getElementById('contentInput').value = note.content || '';
  document.getElementById('saveStatus').textContent = '';
  await loadAttachments(id);
}

async function createNewNote(){
  console.log('[createNewNote] account:', currentAccountId);
  const {data, error} = await sb.from('notes').insert({title:'Untitled',content:'',tags:[],account_id:currentAccountId}).select().single();
  if(error){console.error('[createNewNote] ERROR:', error);return;}
  console.log('[createNewNote] created:', data);
  await loadNotes();
  selectNote(data.id);
}

function scheduleSave(){
  console.log('[scheduleSave] triggered, currentNoteId:', currentNoteId);
  document.getElementById('saveStatus').textContent = 'Saving...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentNote, 600);
}

async function saveCurrentNote(){
  if(!currentNoteId){console.warn('[saveCurrentNote] no currentNoteId, aborting save');return;}
  const title = document.getElementById('titleInput').value || 'Untitled';
  const content = document.getElementById('contentInput').value;
  const tags = document.getElementById('tagsInput').value.split(',').map(t=>t.trim()).filter(Boolean);
  console.log('[saveCurrentNote] saving', {id:currentNoteId, account:currentAccountId, title, content, tags});
  const {error} = await sb.from('notes').update({title,content,tags,updated_at:new Date().toISOString()}).eq('id',currentNoteId).eq('account_id',currentAccountId);
  if(error) console.error('[saveCurrentNote] ERROR:', error);
  else console.log('[saveCurrentNote] save OK');
  document.getElementById('saveStatus').textContent = error ? 'Save failed' : 'Saved';
  if(!error) await loadNotes();
}

async function deleteCurrentNote(){
  if(!currentNoteId) return;
  if(!confirm('Delete this note and its attachments? This cannot be undone.')) return;
  await sb.from('attachments').delete().eq('note_id', currentNoteId);
  await sb.from('notes').delete().eq('id', currentNoteId).eq('account_id', currentAccountId);
  currentNoteId = null;
  document.getElementById('editorView').style.display='none';
  document.getElementById('emptyState').style.display='block';
  await loadNotes();
}

/* ---------- attachments ---------- */
async function loadAttachments(noteId){
  const {data, error} = await sb.from('attachments').select('*').eq('note_id',noteId).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  renderAttachments(data||[]);
}

function renderAttachments(list){
  const container = document.getElementById('attachmentsList');
  if(list.length===0){
    container.innerHTML = '<div style="color:#64748b;font-size:13px;margin-bottom:6px">No attachments yet.</div>';
    return;
  }
  container.innerHTML = list.map(a=>{
    const url = sb.storage.from('attachments').getPublicUrl(a.file_path).data.publicUrl;
    const sizeKb = a.file_size ? (a.file_size/1024).toFixed(1)+' KB' : '';
    return `<div class="attachment-row">
      <a href="${url}?download=${encodeURIComponent(a.file_name)}" target="_blank">📄 ${escapeHtml(a.file_name)} <span style="color:#64748b">(${sizeKb})</span></a>
      <button data-aid="${a.id}" data-path="${a.file_path}" class="removeAttachBtn danger">Remove</button>
    </div>`;
  }).join('');
  container.querySelectorAll('.removeAttachBtn').forEach(btn=>{
    btn.addEventListener('click', ()=>removeAttachment(btn.dataset.aid, btn.dataset.path));
  });
}

async function removeAttachment(id, path){
  if(!confirm('Remove this attachment?')) return;
  await sb.storage.from('attachments').remove([path]);
  await sb.from('attachments').delete().eq('id', id);
  await loadAttachments(currentNoteId);
}

async function uploadAttachment(file){
  if(!currentNoteId){alert('Select or create a note first.');return;}
  const path = `${currentAccountId}/${currentNoteId}/${Date.now()}_${file.name}`;
  document.getElementById('saveStatus').textContent = 'Uploading...';
  const {error: upErr} = await sb.storage.from('attachments').upload(path, file);
  if(upErr){console.error(upErr);document.getElementById('saveStatus').textContent='Upload failed';return;}
  const {error: insErr} = await sb.from('attachments').insert({
    note_id: currentNoteId, file_name: file.name, file_path: path,
    file_size: file.size, mime_type: file.type
  });
  document.getElementById('saveStatus').textContent = insErr ? 'Upload failed' : 'Saved';
  await loadAttachments(currentNoteId);
}

/* ---------- app init (called only after PIN unlock) ---------- */
let appInitialized = false;
function initApp(){
  console.log('[initApp] called, appInitialized was:', appInitialized, 'account:', currentAccountId);
  if(appInitialized) return;
  appInitialized = true;

  /* realtime */
  sb.channel('notes-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'notes'}, ()=>{ loadNotes(); })
    .subscribe();

  sb.channel('attachments-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'attachments'}, (payload)=>{
      const nid = payload.new?.note_id || payload.old?.note_id;
      if(nid && nid===currentNoteId) loadAttachments(currentNoteId);
    })
    .subscribe();

  /* events */
  document.getElementById('newNoteBtn').addEventListener('click', createNewNote);
  document.getElementById('titleInput').addEventListener('input', scheduleSave);
  document.getElementById('tagsInput').addEventListener('input', scheduleSave);
  document.getElementById('contentInput').addEventListener('input', scheduleSave);
  document.getElementById('deleteBtn').addEventListener('click', deleteCurrentNote);
  document.getElementById('attachBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e)=>{
    if(e.target.files[0]) uploadAttachment(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('searchBox').addEventListener('input', (e)=>{
    searchTerm = e.target.value;
    renderNotesList();
  });

  loadNotes();
}
</script>
</body></html>
